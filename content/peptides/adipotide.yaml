summary:
  value: >-
    Chimeric pro-apoptotic peptide targeting prohibitin-1 (PHB1) on adipose-tissue vasculature
    endothelium. Composed of a CKGGRAKDC homing domain coupled to a D(KLAKLAK)₂
    mitochondrial-disrupting sequence. Induces selective apoptosis of adipose blood vessels,
    triggering adipocyte involution and weight loss in obese rhesus monkeys and rodent models. No
    human trials initiated.
