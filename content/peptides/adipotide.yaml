description_md: >-
  ## Overview


  AdipoTide is a synthetic pro-apoptotic peptide bioconjugate designed to selectively destroy
  adipose tissue vasculature by targeting prohibitin-1 (PHB1), a mitochondrial chaperone protein
  enriched on the endothelium of fat-feeding blood vessels. The molecule consists of a CKGGRAKDC
  homing domain that binds PHB1, fused via a short linker to a D(KLAKLAK)₂ membrane-lytic sequence.
  Upon internalisation into adipose endothelial cells, the KLA payload disrupts mitochondrial
  membranes, triggering apoptosis, vascular collapse, and subsequent adipocyte involution.


  ## Preclinical Evidence


  AdipoTide demonstrated significant weight loss and metabolic improvement in diet-induced obese
  (DIO) mice and obese rhesus monkeys. Hossen et al. (2013) compared a free Adipotide bioconjugate
  to a nanoparticle-encapsulated formulation (KLA-PTNP) in DIO mice, finding that systemic low-dose
  injection reduced body weight, lowered serum leptin, and decreased ectopic fat deposition—a
  hallmark of dysfunctional adipose tissue and metabolic syndrome. The nanoparticle formulation
  outperformed the bioconjugate alone, likely due to improved pharmacokinetics and targeting
  efficiency. Effects extended to macrophages within adipose depots, suggesting broader
  anti-inflammatory or remodeling activity.


  ## Mechanism and Selectivity


  The CKGGRAKDC peptide was originally identified via phage display as a ligand for PHB1 expressed
  on adipose vasculature. PHB1 is a mitochondrial protein abnormally presented on the cell surface
  of certain endothelia, particularly in metabolic disease states. The D(KLAKLAK)₂ domain is a
  cationic, amphipathic peptide that becomes membrane-active only upon internalisation; it is inert
  in circulation, minimising systemic toxicity. This dual-domain design confers tissue selectivity:
  the peptide homes to adipose endothelium, triggers internalisation, and then executes apoptosis
  locally.


  ## Clinical Translation Status


  No human trials have been reported. Preclinical work, primarily from Kolonin, Arap, and
  colleagues, generated proof-of-concept data in non-human primates, but translation has stalled.
  Concerns likely include off-target vascular effects, long-term safety of apoptotic peptides, and
  regulatory challenges inherent to a mechanism that deliberately destroys vasculature. The peptide
  remains a research tool and is not approved for human use.


  ## Comparison to Nanoparticle Formulations


  Hossen et al. demonstrated that encapsulating the KLA payload in prohibitin-targeted nanoparticles
  (rather than free bioconjugate) improved efficacy at lower doses, reduced systemic exposure, and
  enhanced adipose-specific accumulation. This suggests that delivery vehicle engineering may be
  critical to advancing vascular-targeted obesity therapeutics, potentially mitigating toxicity
  risks inherent to pro-apoptotic peptides.


  ## Safety and Risk Profile


  The pro-apoptotic mechanism is irreversible and tissue-destructive. While preclinical models
  showed weight loss, the peptide's safety margin, potential for off-target endothelial damage,
  renal/hepatic toxicity, and immunogenicity remain unknown. No peer-reviewed human
  pharmacokinetics, toxicology, or Phase 1 data are available. Use in humans is contraindicated
  absent clinical trials.


  ## Current Research Context


  AdipoTide represents a proof-of-concept for vascular-targeted obesity therapy—an alternative to
  metabolic hormone mimetics or appetite suppressants. Its development underscores the feasibility
  of homing-peptide–effector conjugates for metabolic disease but also highlights translational
  barriers: organ-level tissue destruction, regulatory pathway ambiguity, and long-term safety
  unknowns. It is referenced primarily in academic literature on angiogenesis inhibition and
  peptide-mediated drug delivery, not in active pharmaceutical pipelines.
