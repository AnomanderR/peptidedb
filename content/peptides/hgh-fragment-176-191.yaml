summary:
  value: >-
    C-terminal fragment of human growth hormone spanning amino acids 176-191, with an additional
    N-terminal tyrosine residue in the AOD9604 variant. Retains lipolytic activity of parent GH
    without IGF-1 elevation or diabetogenic effects. Animal studies demonstrate 50% reduction in
    weight gain and enhanced beta-3 adrenergic receptor expression in obese mice. No adverse effects
    on insulin sensitivity observed in euglycemic clamp studies.
  cite: []
