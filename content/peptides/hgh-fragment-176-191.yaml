description_md: >-
  HGH Fragment 176-191 represents the C-terminal lipolytic domain of human growth hormone, spanning
  amino acids 176-191. The AOD9604 variant includes an N-terminal tyrosine residue (177-191
  numbering). This fragment was isolated based on the hypothesis that GH's fat-reducing properties
  could be separated from its growth-promoting and diabetogenic effects.


  Animal studies demonstrate significant fat loss through beta-3 adrenergic receptor upregulation
  without IGF-1 axis activation. In obese Zucker rats, oral administration (500 mcg/kg for 19 days)
  reduced weight gain by over 50% compared to controls, with enhanced adipose tissue lipolytic
  activity and preserved insulin sensitivity via euglycemic clamp testing. Studies in obese mice
  confirmed beta-3 AR mRNA upregulation to levels comparable with lean controls.


  The mechanism was validated in beta-3 AR knockout mice, where the fragment failed to produce
  weight loss or lipolysis observed in wild-type controls, confirming beta-3 AR as the primary
  target. The fragment's independence from the GH/IGF-1 axis eliminates diabetogenic side effects
  associated with full-length growth hormone.


  Metabolic studies identified six potential metabolites, with CRSVEGSCG demonstrating significantly
  greater stability than the parent compound. This metabolite extends the detection window for
  anti-doping purposes — the peptide is banned by WADA and detectable in urine at 50 pg/mL.


  Despite promising pre-clinical data, no peer-reviewed human clinical trials have been published.
  The compound remains experimental, with efficacy, safety, and optimal dosing in humans
  unestablished.
