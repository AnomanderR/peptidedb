summary:
  value: >-
    Seven-amino-acid fragment of spadin (PE 12-28), a sortilin-derived peptide that selectively
    blocks TREK-1 potassium channels. Demonstrates potent antidepressant-like activity in rodent
    models at sub-nanomolar concentrations (IC50 0.12 nM vs 40-60 nM for full spadin). Shorter
    sequence confers enhanced in vivo stability, blood-brain barrier penetration, and improved
    therapeutic window. Pre-clinical only — no human trials reported.
  cite:
    - djillani-2017
    - mazella-2018
