description_md: >-
  ## Research Context


  PE 22-28 represents a rationally designed truncation of spadin (PE 12-28), itself a naturally
  occurring fragment of the sortilin propeptide. Sortilin undergoes furin-mediated cleavage in the
  Golgi, releasing a 44-amino-acid propeptide whose C-terminal region (residues 12-28) was
  identified as a TREK-1 antagonist with antidepressant properties in 2010.


  Structure-activity optimization led to PE 22-28 (Val-Val-Arg-Gly-Trp-Leu-Arg), which retains full
  TREK-1 blocking activity with 300-fold improved potency (IC50 0.12 nM vs 40-60 nM for spadin). The
  shorter sequence exhibits enhanced proteolytic resistance, improved CNS penetration, and reduced
  immunogenic potential compared to the parent peptide.


  ## Mechanism Specificity


  PE 22-28 selectively antagonizes TREK-1 (KCNK2) without affecting TREK-2 (KCNK10) or other K2P
  family members. Critically, it acts as a **state-dependent blocker**: it inhibits arachidonic
  acid-induced TREK-1 activation but does not block basal channel activity or activation by
  synthetic agonists like BL-1249. This suggests PE 22-28 stabilizes a closed channel conformation
  or prevents AA-mediated gating transitions.


  At low concentrations (0.03 µg/kg in mice), PE 22-28 paradoxically **activates** TREK-1, producing
  neuroprotection in stroke models via membrane hyperpolarization. This biphasic action provides a
  therapeutic window: low-dose neuroprotection (acute ischemia) transitions to high-dose TREK-1
  blockade (antidepressant effect) in sequential post-stroke depression protocols.


  ## Behavioral Endpoints


  In chronic unpredictable mild stress (CUMS) models—the gold-standard rodent depression paradigm—PE
  22-28 reverses:

  - Anhedonia (sucrose preference deficit)

  - Immobility in forced swim test

  - Behavioral despair in tail suspension test

  - Hippocampal BDNF downregulation

  - Astrocyte A1 polarization (pro-inflammatory phenotype)


  Onset is faster than fluoxetine (4 vs 14 days), and efficacy is sustained through 28 days of
  administration. Genetic TREK-1 knockout mice display a depression-resistant phenotype, confirming
  the channel as the primary mediator of PE 22-28's effects.


  ## Translation Barriers


  1. **No human pharmacokinetics**: Plasma half-life, volume of distribution, and clearance pathways
  unknown.

  2. **Cardiac safety**: TREK-1 is expressed in sinoatrial node and ventricular myocytes; chronic
  blockade effects on cardiac repolarization not assessed.

  3. **Dose translation**: Rodent IP dosing (0.3-3 µg/kg) does not map cleanly to human subcutaneous
  or oral routes. Allometric scaling requires PK data.

  4. **Patent landscape**: Spadin analogs (including PE 22-28) are subject to academic and
  commercial IP claims, complicating independent development.


  ## Comparative Advantage


  Versus spadin (PE 12-28):

  - 300× higher TREK-1 affinity

  - Improved plasma stability

  - Shorter synthesis cost


  Versus SSRIs (fluoxetine):

  - Faster onset (days vs weeks in animals)

  - Non-monoaminergic mechanism

  - No serotonin syndrome risk


  Versus ketamine (rapid-acting antidepressant):

  - Oral/SQ potential (vs IV ketamine)

  - No dissociative side effects

  - Sustained efficacy without repeated dosing


  ## Open Questions


  - Does chronic TREK-1 blockade impair physiological neuroprotection (e.g., during hypoxia,
  seizures)?

  - Can oral bioavailability be achieved via peptidomimetic scaffolds?

  - What is the therapeutic index in primates?

  - Does antibody development occur with repeated dosing (spadin showed ~50% antibody formation in
  unrelated context)?


  PE 22-28 remains a compelling pre-clinical tool for dissecting TREK-1 biology and a potential lead
  for next-generation antidepressant development, contingent on safety de-risking and human PK
  studies.
