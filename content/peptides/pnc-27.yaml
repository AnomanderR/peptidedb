summary:
  value: >-
    Synthetic 32-amino-acid anticancer peptide combining the HDM-2-binding domain of p53 (residues
    12-26) with a cell-penetrating peptide sequence. Selectively induces necrosis in cancer cells
    via transmembrane pore formation after binding to membrane-associated HDM-2, sparing normal
    cells which express minimal membrane HDM-2. Pre-clinical studies demonstrate efficacy across
    solid tumors and hematologic malignancies.
  cite:
    - pincus-2024
    - sarafrazyazdi-2022
