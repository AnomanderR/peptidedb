administration:
  steps:
    - title: Pre-clinical status
      body: >-
        PNC-27 has not been tested in human subjects. All data derive from in vitro cancer cell line
        studies and limited animal models. No approved clinical formulation, dosing protocol, or
        safety profile exists.
      cite:
        - pincus-2024
    - title: Cell culture protocols
      body: >-
        In vitro studies used 10–100 μM PNC-27 dissolved in cell culture medium. Peptide was added
        directly to cancer cell cultures (pancreatic, breast, colon, ovarian, leukemia lines) and
        incubated for 24–72 hours.
      cite: []
    - title: Fluorescent labeling studies
      body: >-
        Dual-labeled PNC-27 (green on N-terminus, red on C-terminus) demonstrated intact peptide
        binding to cancer cell membranes with combined yellow fluorescence at 30 minutes, persisting
        during cell lysis.
      cite:
        - sookraj-2010
    - title: Membrane HDM-2 requirement
      body: >-
        Cytotoxicity correlates directly with membrane HDM-2 expression levels. Blocking HDM-2's
        p53-binding domain (1-109) with monoclonal antibodies prevents PNC-27-induced necrosis.
      cite: []
