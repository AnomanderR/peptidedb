summary:
  value: >-
    Recombinant 191-amino-acid human growth hormone identical in sequence to endogenous pituitary hGH. FDA-approved
    (1985) for growth hormone deficiency, Turner syndrome, chronic renal insufficiency, Prader-Willi syndrome, AIDS
    wasting, idiopathic short stature, and other indications. Binds GH receptors systemically to promote linear growth,
    protein synthesis, lipolysis, and IGF-1 production. Daily subcutaneous administration replaces or supplements
    deficient endogenous GH.
  cite:
    - goeddel-1979
    - ho-2007-ghd-consensus
