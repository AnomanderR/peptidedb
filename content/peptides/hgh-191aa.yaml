administration:
  steps:
    - title: Reconstitution (if lyophilized)
      body: >-
        Add diluent (sterile water or bacteriostatic water per manufacturer) to vial. Swirl gently — do not shake.
        Solution should be clear, colorless. Concentration varies by brand (e.g., 5 mg or 10 mg per vial).
      cite: []
    - title: Injection site
      body: >-
        Subcutaneous — rotate sites: abdomen, thigh, buttocks, upper arm. Avoid same site within 1 cm for 2 weeks to
        prevent lipodystrophy.
      cite: []
    - title: Timing
      body: >-
        Once daily, evening preferred (6–8 PM or pre-sleep). Mimics physiological nocturnal GH secretion. Consistency is
        critical.
      cite: []
    - title: Storage
      body: >-
        Unreconstituted: refrigerate 2–8 °C, protect from light. Reconstituted: refrigerate, use within 14–28 days
        (brand-specific). Do not freeze.
      cite: []
    - title: Needle
      body: 27–31G, 4–8 mm insulin syringe or pen device. Pinch skin, 45–90° angle depending on subcutaneous thickness.
      cite: []
    - title: Monitoring
      body: >-
        Baseline and periodic: IGF-1 (target age/sex-adjusted midrange), fasting glucose, HbA1c, thyroid function (TSH,
        free T4), bone age (children), lipid panel. Fundoscopy if headache/visual symptoms.
      cite: []
synergy:
  stacks:
    - partner_slug: ipamorelin
      partner_label: Ipamorelin
      synergy: moderate
      rationale: >-
        Ipamorelin (GHRP) stimulates endogenous GH release, which is redundant when exogenous rhGH is administered.
        However, ipamorelin may still amplify pulsatility of remaining endogenous secretion in partial GHD or during GH
        dose titration. Not typically combined in standard clinical practice; more common in experimental or off-label
        protocols. Limited evidence for additive benefit.
      protocol:
        HGH 191AA: Standard dose per indication
        Ipamorelin: 100–200 mcg SQ · morning (if used)
        Note: Monitor IGF-1 closely; avoid supraphysiological levels
      primary_benefit: Theoretical enhancement of pulsatility; limited clinical rationale
      cite: []
    - partner_slug: tesamorelin
      partner_label: Tesamorelin
      synergy: weak
      rationale: >-
        Tesamorelin (GHRH analogue) stimulates endogenous GH secretion, which is unnecessary when exogenous rhGH is
        already provided. Combining both offers no mechanistic advantage and increases cost, side effects, and IGF-1
        elevation risk. Not recommended in clinical practice.
      protocol:
        Note: Combination not recommended — choose one GH modality
      primary_benefit: None — redundant mechanisms
      cite: []
description_md: >-
  ## Overview


  HGH 191AA (somatropin) is the recombinant form of human growth hormone, synthesized via recombinant DNA technology to
  match the 191-amino-acid sequence of endogenous pituitary GH. First approved by the FDA in 1985, it has become the
  standard treatment for growth hormone deficiency (GHD) in children and adults, as well as multiple other indications
  including Turner syndrome, chronic renal insufficiency, Prader-Willi syndrome, idiopathic short stature, and AIDS
  wasting.


  ## Clinical Context


  In children, GH therapy promotes linear growth by stimulating epiphyseal plate chondrocytes, increasing IGF-1
  synthesis, and enhancing protein anabolism. In adults, GH replacement improves body composition (reducing fat mass,
  increasing lean mass), bone density, exercise capacity, and quality of life. The hormone exerts both direct metabolic
  effects (lipolysis, anti-insulin actions) and indirect effects via hepatic IGF-1 production.


  ## Evidence Base


  Decades of randomized controlled trials and real-world data support GH therapy efficacy and safety in FDA-approved
  populations. Long-term registries (e.g., KIGS, GeNeSIS) track growth outcomes, safety signals, and rare adverse
  events. Post-marketing surveillance continues to refine risk-benefit understanding, particularly regarding cancer risk
  in childhood cancer survivors (ongoing debate).


  ## Key Considerations


  - **Diagnosis Confirmation**: GH therapy requires biochemical confirmation of GHD via stimulation testing (insulin
  tolerance test, glucagon test, etc.) or clear syndromic diagnosis (Turner, Prader-Willi).

  - **IGF-1 Monitoring**: Dose titration targets age- and sex-adjusted IGF-1 midrange. Supraphysiological IGF-1
  increases side effect risk.

  - **Glucose Surveillance**: GH opposes insulin action; monitor fasting glucose and HbA1c, especially in high-dose
  regimens (AIDS wasting).

  - **Thyroid Axis**: GH may unmask central hypothyroidism; check thyroid function before and during therapy.

  - **Epiphyseal Closure**: In children, treatment continues until growth plates fuse (bone age ~14 years girls, ~16
  years boys).


  ## Off-Label Use


  rhGH is used off-label for anti-aging, body recomposition, and athletic performance enhancement. These uses lack FDA
  approval and long-term safety data. Ethical, legal, and medical professional guidelines strongly discourage such use
  outside of diagnosed GHD or other approved indications.
