summary:
  value: >-
    D-retro-inverso peptide derived from the FOXO4 transcription factor's p53-binding domain.
    Disrupts FOXO4-p53 interaction selectively in senescent cells, triggering apoptosis while
    sparing healthy tissue. Cleared senescent cells in aged mice, restored cerebral blood flow, and
    improved physical function. Pre-clinical only — no human trials completed.
