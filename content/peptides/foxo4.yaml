description_md: >-
  ## Overview


  FOXO4-DRI is a D-retro-inverso peptide designed to selectively eliminate senescent cells by
  disrupting the FOXO4-p53 protein complex. Senescent cells accumulate with age and disease,
  contributing to inflammation, tissue dysfunction, and age-related pathologies. FOXO4-DRI binds the
  disordered p53 transactivation domain, displacing FOXO4 and triggering apoptosis selectively in
  senescent cells while preserving healthy tissue.


  ## Structural Design


  The D-retro-inverso modification — inverted amino acid sequence with D-amino acids — confers
  protease resistance and extended plasma stability compared to natural L-amino acid peptides. This
  modification enables systemic delivery and tissue penetration in animal models.


  ## Pre-Clinical Evidence


  In aged mice, FOXO4-DRI administration cleared senescent cells, restored physical function,
  improved fur density, and reversed age-related testosterone insufficiency by targeting senescent
  Leydig cells. Cerebral blood flow and blood-brain barrier integrity improved in aged mammalian
  models. Studies in keloid fibroblasts demonstrated selective apoptosis induction via upregulated
  p53-Ser15 phosphorylation and nuclear exclusion.


  ## Critical Caveat: Pulmonary Hypertension


  A 2023 *Circulation* study reported that senescent cell elimination with senolytics (including
  FOXO4-DRI) promoted pulmonary hypertension development and progression in rodent models,
  contradicting the assumption that senolysis is universally beneficial. This context-dependent
  toxicity raises significant safety concerns for clinical translation.


  ## Current Status


  No human trials have been completed or registered. Cleara Biotech (Netherlands) holds commercial
  rights and is pursuing development. The peptide remains an experimental tool for senescence
  research with unknown human safety, efficacy, and dosing parameters.
