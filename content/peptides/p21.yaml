summary:
  value: >-
    Synthetic ~21-amino-acid peptide derived from ciliary neurotrophic factor (CNTF). Activates
    CNTFR/LIFR/gp130 heterotrimeric receptor complex on neural stem cells to promote neurogenesis,
    stem cell self-renewal, and neuroregeneration. Animal models demonstrate effects in olfactory
    epithelium regeneration, CDKL5 deficiency disorder, and hippocampal neurogenesis. No clinical
    trial data in humans.
  cite: []
