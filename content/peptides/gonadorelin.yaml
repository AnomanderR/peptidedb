summary:
  value: >-
    Synthetic decapeptide identical to endogenous gonadotropin-releasing hormone. Pulsatile
    administration restores physiological LH/FSH secretion in hypothalamic hypogonadism by mimicking
    native GnRH pulsatility. Single-dose administration used diagnostically to assess pituitary
    gonadotrope responsiveness. Continuous exposure paradoxically downregulates GnRH receptors,
    forming the basis for GnRH agonist desensitization protocols.
  cite: []
hero_stats:
  - value: 90 min
    label: Pulsatile interval
    cite: []
  - value: 73%
    label: Ovulation restoration
    cite:
      - tadesse-2026
  - value: 2–4 min
    label: Plasma half-life
    cite: []
hero_route:
  value: IV / SQ · Pulsatile Pump (Therapeutic) · Single Bolus (Diagnostic)
  cite: []
mechanism:
  primary_target:
    value: GnRH receptors on anterior pituitary gonadotropes
    cite: []
  pathway:
    value: GnRH → Pituitary gonadotrope → LH/FSH secretion → Gonadal steroidogenesis
    cite:
      - sharma-2026
  downstream_effect:
    value: >-
      Pulsatile LH/FSH release stimulates testicular testosterone or ovarian estradiol/progesterone
      synthesis; initiates folliculogenesis and spermatogenesis
    cite:
      - robin-2026
      - sharma-2026
  origin:
    value: >-
      Synthetic decapeptide (pGlu-His-Trp-Ser-Tyr-Gly-Leu-Arg-Pro-Gly-NH2) identical to native
      hypothalamic GnRH
    cite: []
  feedback_intact:
    value: >-
      Yes — pulsatile delivery preserves negative feedback loops; continuous exposure desensitizes
      receptors
    cite: []
    badge: green
  receptor_class:
    value: G-protein coupled receptor (Gq/11 pathway)
    cite: []
  half_life_basis:
    value: Rapid enzymatic degradation by hypothalamic endopeptidases; plasma t½ ~2–4 minutes
    cite: []
  extra_rows:
    - key: Pulsatility requirement
      value:
        value: >-
          Essential — continuous exposure downregulates GnRH receptors within 7–14 days, suppressing
          gonadotropins
        cite:
          - robin-2026
    - key: Kisspeptin regulation
      value:
        value: >-
          Endogenous GnRH neurons are activated by arcuate kisspeptin neurons, which synchronize to
          generate pulsatile GnRH release
        cite:
          - morris-2026
          - wittner-2026
