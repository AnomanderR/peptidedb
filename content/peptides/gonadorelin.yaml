administration:
  steps:
    - title: Diagnostic protocol
      body: >-
        Administer 100 mcg IV or SQ bolus. Draw baseline LH/FSH, then at 30, 60, 90 minutes. Normal
        response: LH ≥2× baseline, FSH modest rise. Blunted response suggests pituitary pathology;
        exaggerated response may indicate primary hypogonadism.
      cite: []
    - title: Therapeutic pump setup (pulsatile)
      body: >-
        Requires programmable infusion pump with IV catheter. Set pulse interval to 90 min (females)
        or 120 min (males). Bolus dose 5–20 mcg per pulse. Pump worn continuously; catheter site
        rotated every 48–72 hrs to prevent infection.
      cite: []
    - title: Reconstitution
      body: >-
        Lyophilised gonadorelin reconstituted with sterile saline or provided diluent. Typically
        0.8–3.2 mg dissolved in 8 mL for pump reservoir. Solution stable 7–14 days refrigerated.
      cite: []
    - title: Monitoring
      body: >-
        For fertility protocols: ultrasound follicular tracking + serial estradiol/LH measurements.
        Adjust pulse dose to achieve mid-follicular LH 5–10 IU/L. Ovulation confirmed by
        progesterone rise or ultrasound.
      cite: []
    - title: Timing
      body: >-
        Pulsatile therapy initiated at any point in cycle. Diagnostic test performed in morning
        (higher baseline LH). For ovulation induction, treatment begins early follicular phase.
      cite: []
synergy:
  stacks:
    - partner_slug: hcg
      partner_label: hCG (Human Chorionic Gonadotropin)
      synergy: multi-pathway
      rationale: >-
        In hypogonadotropic hypogonadism protocols, gonadorelin restores pituitary LH/FSH
        pulsatility, while exogenous hCG directly stimulates Leydig cells (acting as LH mimetic) to
        maintain testosterone production. This dual approach ensures both central axis restoration
        and immediate gonadal steroidogenesis, preventing testicular atrophy during fertility
        treatment. hCG's longer half-life (24–36 hrs) complements gonadorelin's pulsatile
        short-acting profile.
      protocol:
        Gonadorelin: 5–10 mcg IV every 120 min (pulsatile pump)
        hCG: 1500–2000 IU SQ · 2–3× per week
        Duration: 12–24 weeks for spermatogenesis induction
      primary_benefit: Fertility restoration in hypothalamic hypogonadism with maintained testicular function
      cite: []
    - partner_slug: hmg
      partner_label: hMG (Human Menopausal Gonadotropin)
      synergy: multi-pathway
      rationale: >-
        For ovulation induction in hypothalamic amenorrhea, gonadorelin provides pulsatile GnRH
        stimulation while hMG supplies exogenous FSH/LH to directly drive folliculogenesis. This
        combination is reserved for refractory cases or when pump therapy is impractical. hMG
        bypasses the need for endogenous pituitary response, ensuring follicular recruitment even
        with suboptimal gonadotrope function.
      protocol:
        Gonadorelin: 5–20 mcg IV every 90 min (pulsatile pump) OR
        hMG: 75–150 IU SQ daily (if pump unavailable)
        Monitoring: Ultrasound + estradiol every 2–3 days
      primary_benefit: Controlled ovulation induction with lower OHSS risk vs hMG monotherapy
      cite: []
