summary:
  value: >-
    24-amino-acid mitochondrial-derived peptide encoded in the 16S rRNA region of mtDNA.
    Cytoprotective via direct binding to Bax, Bim, and tBid, preventing mitochondrial outer membrane
    permeabilization and caspase-dependent apoptosis. Studied in models of Alzheimer's disease,
    premature ovarian insufficiency, testicular aging, and bone growth retardation. Acts
    intracellularly and as a secreted factor via FPRL1/2 receptors.
  cite:
    - zhu-2022
    - lue-2021
    - morris-2021
