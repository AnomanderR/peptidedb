description_md: >-
  Humanin is the founding member of the mitochondrial-derived peptide (MDP) family, encoded by a
  short open reading frame in the 16S rRNA region of mitochondrial DNA. It exerts cytoprotective
  effects by binding pro-apoptotic Bcl-2 family proteins (Bax, Bim, tBid) intracellularly and by
  activating extracellular FPRL1/2 receptors to modulate ASK/JNK signaling. Animal studies
  demonstrate protection against cyclophosphamide-induced ovarian failure, testicular aging,
  venetoclax-induced bone growth retardation, and hypoxic neuronal injury. A novel mechanism
  involves inducing amyloid-like fibrillation of Bax and BID, sequestering them into non-functional
  aggregates. Humanin and its 13 homologs (MTRNR2L1-L13) represent a mitochondrial signaling axis
  linking organellar stress to cell survival. No human clinical trials exist; all data derive from
  rodent models and ex vivo systems.
