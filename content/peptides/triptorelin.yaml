summary:
  value: >-
    Synthetic decapeptide gonadotropin-releasing hormone (GnRH) agonist, FDA-approved for advanced
    prostate cancer, endometriosis, and central precocious puberty. Initial pituitary flare (1–3
    weeks) followed by receptor downregulation produces sustained suppression of LH, FSH, and
    downstream sex hormones. Available in 1-month, 3-month, and 6-month depot formulations.
    Distinguished by biphasic mechanism: transient stimulation, then prolonged castration-level
    testosterone (<50 ng/dL).
  cite:
    - jia-2025
    - yee-2025
    - anon-2012
