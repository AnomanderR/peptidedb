administration:
  steps:
    - title: Formulation selection
      body: >-
        Choose 1-month (3.75 mg), 3-month (11.25 mg), or 6-month (22.5 mg) depot based on adherence
        needs and clinical context. 6-month formulation shows improved real-world adherence in
        Asia-Pacific cohorts.
      cite: []
    - title: Injection site
      body: >-
        Intramuscular — gluteal or deltoid muscle. Use 21–23G needle. Aspirate to confirm
        non-vascular placement. Rotate sites with repeat injections.
      cite: []
    - title: Initial flare mitigation
      body: >-
        For metastatic prostate cancer: co-administer antiandrogen (e.g., bicalutamide 50 mg daily)
        starting 1 week before first injection and continuing 2–4 weeks to prevent tumor flare.
      cite: []
    - title: Monitoring schedule
      body: >-
        Baseline: testosterone, PSA, bone density (DEXA), lipids, glucose. Follow-up: testosterone
        at 4 weeks (confirm <50 ng/dL castration), PSA monthly × 3, then quarterly. Annual DEXA for
        bone loss.
      cite: []
    - title: Storage
      body: >-
        Store vials at room temperature (20–25 °C), protect from light. Do not freeze. Reconstituted
        suspension should be used immediately.
      cite: []
    - title: Intermittent ADT protocol (optional)
      body: >-
        Some protocols use on-treatment periods (9–12 months) alternating with off-treatment
        intervals until PSA rises. Cardiovascular risk appears similar to continuous ADT.
      cite: []
synergy:
  stacks:
    - partner_slug: bicalutamide
      partner_label: Bicalutamide
      synergy: strong
      rationale: >-
        Triptorelin produces an initial testosterone flare (1–3 weeks) that can transiently worsen
        metastatic prostate cancer symptoms, including bone pain and spinal cord compression.
        Bicalutamide, a non-steroidal antiandrogen, blocks androgen receptors peripherally,
        preventing flare-related tumor stimulation. This combination is standard-of-care in advanced
        prostate cancer to safely transition into sustained castration.
      protocol:
        Triptorelin: 3.75 mg IM (or long-acting depot)
        Bicalutamide: 50 mg oral daily, start 1 week pre-triptorelin
        Duration: Continue bicalutamide 2–4 weeks post-injection
      primary_benefit: Prevents tumor flare, safer ADT initiation in metastatic disease
      cite: []
