side_effects:
  rows:
    - parameter: Initial flare symptoms
      value:
        value: Bone pain, urinary obstruction, spinal cord compression (first 2 weeks)
        cite: []
      notes:
        value: Antiandrogen co-treatment (bicalutamide) mitigates flare in metastatic disease.
        cite: []
      severity: moderate
    - parameter: Cardiovascular events
      value:
        value: MI, stroke, arrhythmia — GnRH agonists show higher CV risk vs antagonists in meta-analyses
        cite:
          - patel-2025
          - preston-2024
      severity: severe
    - parameter: Hot flashes
      value:
        value: Very common (>60%); vasomotor instability
        cite: []
      severity: mild
    - parameter: Bone loss / Osteoporosis
      value:
        value: Accelerated bone mineral density decline; fracture risk ↑
        cite:
          - friedrich-2025
      notes:
        value: Baseline DEXA scan recommended; bisphosphonates or denosumab may be indicated.
        cite: []
      severity: moderate
    - parameter: Metabolic syndrome
      value:
        value: Weight gain, insulin resistance, dyslipidemia, diabetes risk
        cite: []
      severity: moderate
    - parameter: Sexual dysfunction
      value:
        value: Erectile dysfunction, loss of libido (expected pharmacological effect)
        cite:
          - jia-2025
      severity: moderate
    - parameter: Injection site reactions
      value:
        value: Pain, erythema, sterile abscess (rare with depot formulations)
        cite: []
      severity: mild
    - parameter: Gynecomastia / Breast tenderness
      value:
        value: Common (10–20%); peripheral aromatization of residual androgens
        cite: []
      severity: mild
    - parameter: Fatigue / Mood changes
      value:
        value: Anemia, depression, cognitive changes reported in long-term ADT
        cite: []
      severity: moderate
    - parameter: Hepatotoxicity
      value:
        value: Transient transaminase elevations; clinically apparent liver injury rare
        cite: []
      severity: mild
    - parameter: Racial differences (ADT)
      value:
        value: Black veterans show higher CV event rates vs White veterans on GnRH agonists
        cite: []
      severity: moderate
