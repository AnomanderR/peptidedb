summary:
  value: >-
    Native 31-amino-acid incretin hormone secreted by intestinal L cells in response to nutrient
    ingestion. Stimulates glucose-dependent insulin secretion, suppresses glucagon, and delays
    gastric emptying. Rapidly degraded by dipeptidyl peptidase-4 (DPP-4) with plasma half-life of ~2
    minutes. Parent molecule from which all clinical GLP-1 receptor agonists (semaglutide,
    liraglutide, dulaglutide, exenatide) were engineered. Direct administration rarely used
    clinically; studied primarily as reference standard for analogue development.
  cite: []
