administration:
  steps:
    - title: Research use only
      body: >-
        Native GLP-1(7-37) is not formulated for therapeutic use. Administered IV or SC in
        experimental protocols to study GLP-1R pharmacology and as reference standard for analogue
        development.
      cite: []
    - title: Storage
      body: >-
        Lyophilised peptide stored at -20°C or below. Reconstituted solutions should be prepared
        fresh and used immediately due to rapid degradation.
      cite: []
    - title: Clinical alternatives
      body: >-
        For therapeutic GLP-1R activation, use FDA-approved long-acting analogues: semaglutide (once
        weekly), liraglutide (once daily), dulaglutide (once weekly), or exenatide (twice daily or
        once weekly).
      cite: []
synergy:
  stacks:
    - partner_slug: dpp4-inhibitors
      partner_label: DPP-4 Inhibitors
      synergy: moderate
      rationale: >-
        DPP-4 inhibitors (sitagliptin, linagliptin) block enzymatic cleavage of native GLP-1,
        extending its half-life from ~2 minutes to 4–6 minutes. This increases endogenous GLP-1
        availability and enhances postprandial insulin secretion. Used clinically to amplify
        physiological GLP-1 signaling without exogenous peptide administration.
      protocol:
        Context: Clinical diabetes management
        DPP-4 inhibitor: Sitagliptin 100 mg PO once daily
        Effect: 2–3× increase in active GLP-1 levels
      primary_benefit: Prolonged endogenous GLP-1 activity, improved glycemic control
      cite: []
description_md: >-
  Native GLP-1(7-37) is the bioactive incretin hormone secreted by intestinal L cells following
  nutrient ingestion. It binds the GLP-1 receptor on pancreatic β-cells, stimulating
  glucose-dependent insulin secretion while suppressing glucagon release. Despite potent
  insulinotropic effects, its extremely short plasma half-life (~2 minutes) due to DPP-4 cleavage
  and renal clearance renders it unsuitable for therapeutic use.


  All clinical GLP-1 receptor agonists derive from this parent molecule through structural
  modifications that confer DPP-4 resistance and prolonged circulation. The 2024 Lasker Award
  recognized the discovery of GLP-1(7-37) by Joel Habener and Svetlana Mojsov, and its translation
  into obesity medicines by Lotte Knudsen.


  Native GLP-1 remains essential as a research standard for evaluating receptor binding, signaling
  kinetics, and analogue efficacy in preclinical studies.
