summary:
  value: >-
    Mechano Growth Factor (MGF) is the IGF-1Ec splice variant produced locally in skeletal muscle in
    response to mechanical loading or damage. Distinguished from systemic IGF-1 by a unique
    49-amino-acid E-domain that activates satellite cells and drives muscle repair independently of
    mature IGF-1. The synthetic 24-amino-acid E-domain peptide recapitulates MGF bioactivity in
    vitro and in rodent models but lacks human clinical validation.
  cite: []
