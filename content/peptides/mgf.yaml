description_md: >-
  ## Overview


  Mechano Growth Factor (MGF) is the IGF-1Ec splice variant expressed locally in skeletal and
  cardiac muscle following mechanical stress or tissue damage. Unlike systemic IGF-1 (primarily
  liver-derived), MGF arises from alternative splicing of the IGF-1 gene and encodes a unique
  49-amino-acid carboxyl-terminal E-domain. This E-domain, when cleaved post-translationally, acts
  as an independent signaling peptide that activates muscle satellite cells (Pax7+ progenitors) and
  drives myoblast proliferation.


  **Key distinctions from mature IGF-1:**

  - **Local expression:** MGF mRNA upregulated at the site of muscle damage, not systemically.

  - **Satellite cell specificity:** E-domain preferentially activates quiescent satellite cells;
  mature IGF-1 acts on differentiated fibers.

  - **Mechanical trigger:** Eccentric contractions and mechanical loading induce MGF > concentric or
  metabolic stress.

  - **Species specificity:** Human IGF-1Ec (hEc) and rodent IGF-1Eb E-domains are structurally
  distinct; data are not directly translatable.


  The synthetic 24-amino-acid MGF peptide (hEc fragment) replicates E-domain bioactivity in cell
  culture and rodent injury models—improving cardiac function post-myocardial infarction and
  enhancing muscle repair in murine studies. However, **zero human clinical trials exist**. All
  dosing, safety, and efficacy claims derive from animal or in vitro work.


  ## Cancer & Safety Concerns


  Chronic IGF-1Ec overexpression associates with progression of multiple malignancies:

  - **Colorectal cancer:** IGF-1Ec expression increases with polyp dysplasia grade and correlates
  with recurrent disease.

  - **Prostate cancer:** Preferential IGF-1Ec expression in PC-3 cells; E-domain acts as a
  progression factor.

  - **Breast cancer:** IGF-1Ec linked to EMT, metastasis, and survival pathway activation.

  - **Osteosarcoma:** Elevated IGF-1Ec in tumor tissue vs. normal bone.


  These findings raise significant safety flags for exogenous MGF administration, particularly in
  individuals with occult or familial cancer risk.


  ## Regulatory Status


  MGF peptides have been prohibited by the World Anti-Doping Agency (WADA) since 2005 under the
  category of growth factors. Full-length MGF products, marketed illicitly to athletes, have been
  characterized via mass spectrometry in doping control contexts. No therapeutic indication exists;
  all human use falls outside regulatory approval.


  ## Evidence Gaps


  - **No human pharmacokinetics:** Half-life, bioavailability, and clearance unknown.

  - **No dose-response data:** Animal doses non-translatable; no maximum tolerated dose established.

  - **No safety monitoring:** Long-term effects, antibody formation, and off-target signaling
  uncharacterized.

  - **Age-related blunting:** Older adults (70+ yrs) exhibit dysregulated IGF-1Ec expression
  post-exercise, suggesting efficacy may vary with age.


  MGF remains a mechanistically intriguing but clinically unvalidated peptide. Its role in muscle
  repair is well-established at the molecular level, but therapeutic translation requires Phase 1/2
  human trials that do not yet exist.
