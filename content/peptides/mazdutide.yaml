summary:
  value: >-
    Oxyntomodulin-based dual GLP-1 receptor and glucagon receptor agonist developed by Innovent
    Biologics in collaboration with Eli Lilly. Phase 3 trials in China demonstrate 12–16% body
    weight reduction at 24–48 weeks in non-diabetic adults with obesity (BMI ≥30 kg/m²). Once-weekly
    subcutaneous administration targets dual metabolic pathways — GLP-1-mediated appetite
    suppression and glucagon-driven energy expenditure.
  cite:
    - ji-2026
    - azam-2026
    - abdul-2026
