administration:
  steps:
    - title: Preparation
      body: >-
        Supplied as pre-filled pen or reconstituted vial (per manufacturer instructions). Inspect
        solution — should be clear, colorless to pale yellow. Discard if cloudy or particulate
        matter present.
      cite: []
    - title: Injection site
      body: >-
        Subcutaneous — abdomen preferred, also thigh or upper arm. Rotate sites weekly. Avoid areas
        with scarring, moles, or active inflammation.
      cite: []
    - title: Timing
      body: >-
        Once weekly, same day each week. May be taken with or without food. If dose missed,
        administer within 3 days; if >3 days, skip and resume next scheduled dose.
      cite: []
    - title: Storage
      body: >-
        Refrigerate 2–8 °C. Do not freeze. May be kept at room temperature (<25 °C) for up to 14
        days if needed. Protect from light.
      cite: []
    - title: Needle technique
      body: >-
        Use supplied needle or compatible insulin syringe (if reconstituting). Pinch skin, inject at
        90° angle. Hold 5–10 seconds before withdrawing needle to prevent leakage.
      cite: []
synergy:
  stacks:
    - partner_slug: metformin
      partner_label: Metformin
      synergy: moderate
      rationale: >-
        Metformin (1500–2000 mg/day) complements mazdutide via AMPK activation, insulin
        sensitization, and hepatic glucose suppression. Both agents reduce weight and improve
        glycemic control through distinct mechanisms — metformin targets hepatic gluconeogenesis and
        peripheral insulin sensitivity, while mazdutide acts on incretin and glucagon pathways.
        Combination may enhance metabolic outcomes in T2D with obesity.
      protocol:
        Mazdutide: 9 mg SQ weekly
        Metformin: 1500–2000 mg PO daily (divided doses)
        Monitoring: HbA1c, renal function (metformin), GI tolerability
      primary_benefit: Additive weight loss and glycemic control in T2D
      cite: []
    - partner_slug: sglt2-inhibitor
      partner_label: SGLT2 Inhibitor (e.g., empagliflozin)
      synergy: multi-pathway
      rationale: >-
        SGLT2 inhibitors promote renal glucose excretion and modest weight loss (~2–3 kg) while
        reducing cardiovascular and renal risk. Mazdutide's dual GLP-1/glucagon mechanism targets
        appetite and energy expenditure. Multi-pathway synergy addresses obesity, hyperglycemia, and
        cardiometabolic risk via complementary renal, gut, and hepatic effects. No pharmacokinetic
        interaction expected.
      protocol:
        Mazdutide: 9 mg SQ weekly
        Empagliflozin: 10–25 mg PO daily
        Precautions: Monitor for euglycemic DKA, volume depletion
      primary_benefit: Enhanced weight loss, glycemic control, cardiorenal protection
      cite: []
    - partner_slug: phentermine
      partner_label: Phentermine (short-term adjunct)
      synergy: weak
      rationale: >-
        Phentermine (sympathomimetic appetite suppressant, 15–37.5 mg/day) may provide additional
        short-term appetite suppression (≤12 weeks) in patients with suboptimal GLP-1-mediated
        satiety response. However, mazdutide already delivers robust appetite reduction via incretin
        axis; phentermine adds cardiovascular risk (tachycardia, hypertension). Use cautiously,
        monitor heart rate and blood pressure. Not recommended as standard combination.
      protocol:
        Mazdutide: 9 mg SQ weekly
        Phentermine: 15–37.5 mg PO AM (≤12 weeks)
        Monitoring: Heart rate, BP, mood/anxiety symptoms
      primary_benefit: Potential short-term appetite augmentation (limited evidence)
      cite: []
description_md: >-
  ## Overview


  Mazdutide (IBI362 / LY3305677) is a synthetic oxyntomodulin analogue with dual agonist activity at
  GLP-1 and glucagon receptors. Developed jointly by Innovent Biologics and Eli Lilly, mazdutide
  represents a next-generation multi-receptor metabolic modulator designed to address obesity and
  type 2 diabetes through complementary pathways.


  ## Patent & Development Landscape


  Initial composition-of-matter patents filed by Eli Lilly (2015–2018) covered oxyntomodulin analogs
  and synthetic modifications for stability and pharmacokinetics. Innovent Biologics subsequently
  advanced formulation, dosing regimen, and indication-expansion strategies. Patent families
  encompass:


  - Peptide composition and linker modifications

  - Once-weekly subcutaneous formulation

  - Therapeutic use claims: obesity, T2D, hyperuricemia, adolescent obesity

  - Process chemistry and manufacturing routes


  Key patents expire 2035–2040, with potential for pediatric and lifecycle extensions.


  ## Clinical Development Status (2026)


  **Phase 3 China:**

  - Obesity (BMI ≥30 kg/m²): DREAMS obesity program

  - Type 2 diabetes + obesity: DREAMS-3 trial (vs semaglutide 1 mg)


  **Phase 2 Completed:**

  - Chinese adults BMI ≥30 kg/m² without diabetes: 9 mg weekly dose established

  - Weight loss: 12.4% (meta-analysis), 9.8 kg absolute reduction at 24 weeks


  **Global Development:**

  - Regulatory submissions anticipated 2026–2027 (China NMPA priority)

  - US/EU filings contingent on Phase 3 readout and cardiometabolic outcome data


  ## Dual Agonism Rationale


  Oxyntomodulin is an endogenous peptide co-secreted with GLP-1 from intestinal L-cells. It exhibits
  dual activity:


  1. **GLP-1 receptor agonism:** Appetite suppression, insulin secretion, delayed gastric emptying

  2. **Glucagon receptor agonism:** Hepatic lipolysis, increased energy expenditure, thermogenesis


  Mazdutide stabilizes and amplifies this dual action via structural modifications that extend
  half-life and receptor affinity. The glucagon component differentiates mazdutide from pure GLP-1
  agonists (e.g., semaglutide, tirzepatide's GIP co-agonism) by leveraging hepatic metabolic
  pathways historically viewed as diabetogenic — now repurposed for energy balance correction.


  ## Comparative Context


  Mazdutide occupies a position between:


  - **Single GLP-1 agonists** (semaglutide, liraglutide): ~15% weight loss, well-characterized
  safety

  - **GLP-1/GIP dual agonists** (tirzepatide): ~21% weight loss, GIP co-agonism for enhanced
  efficacy

  - **GLP-1/glucagon dual agonists** (cotadutide, survodutide): Emergent class, energy expenditure
  focus


  Early meta-analyses suggest mazdutide's 12.4% weight loss at 9 mg weekly trails tirzepatide's
  efficacy but exceeds semaglutide 1 mg. Direct head-to-head data (DREAMS-3) will clarify
  positioning.


  ## Glucagon Receptor Agonism: From Foe to Therapeutic Tool


  Historically, glucagon receptor antagonism was pursued to reduce hepatic glucose output in T2D.
  However, dual GLP-1/glucagon agonism paradoxically improves metabolic outcomes:


  - **Energy expenditure ↑:** Glucagon increases thermogenesis and hepatic fatty acid oxidation

  - **Appetite remains suppressed:** GLP-1 axis dominates satiety signaling

  - **Weight loss enhanced:** Dual mechanism outperforms GLP-1 monotherapy in preclinical models

  - **Glycemic control preserved:** Insulin secretion (GLP-1) offsets glucagon's hyperglycemic
  potential


  This "repurposing" reflects a paradigm shift: glucagon receptor agonism, when balanced by GLP-1
  activity, becomes an anti-obesity tool rather than a diabetogenic liability.


  ## China Obesity Epidemic Context


  China's obesity prevalence has escalated rapidly:


  - **2020:** 16.4% obese (BMI ≥28 kg/m² Chinese standard)

  - **Projections (2030):** 65.3 million adults with severe obesity

  - **Comorbidities:** T2D, cardiovascular disease, NAFLD rising sharply


  Mazdutide's development prioritizes Chinese populations, reflecting:


  1. Regulatory pathways (NMPA expedited review for metabolic disease)

  2. Unmet need for accessible, effective pharmacotherapy

  3. Local clinical trial infrastructure and patient recruitment advantages


  Global expansion contingent on China Phase 3 success and safety profile establishment.


  ## Outstanding Questions


  - **Durability:** Weight regain dynamics upon discontinuation?

  - **Cardiovascular outcomes:** Dedicated CVOT pending (required for US approval)

  - **Lean mass preservation:** Body composition data limited in current abstracts

  - **Dose optimization:** Is 9 mg ceiling, or can 12–15 mg improve efficacy?

  - **Adolescent obesity:** Separate trials planned; dosing and safety in <18 years?

  - **Long-term glucagon receptor agonism:** Hepatic, renal, cardiovascular safety over >2 years?


  ## Competitive Landscape (2026)


  Mazdutide enters a crowded incretin-based therapy market:


  - **Approved:** Semaglutide (Wegovy), tirzepatide (Zepbound), liraglutide (Saxenda)

  - **Phase 3:** Retatrutide (GLP-1/GIP/glucagon triple agonist), survodutide (GLP-1/glucagon),
  cagrilintide + semaglutide

  - **Oral formulations:** Oral semaglutide (Rybelsus), emerging oral GLP-1 candidates


  Mazdutide's differentiation:


  - **Once-weekly dosing** (competitive with semaglutide, tirzepatide)

  - **Dual GLP-1/glucagon mechanism** (distinct from GIP co-agonism)

  - **China-first regulatory strategy** (faster market entry, large addressable population)

  - **Cost structure** (potentially lower than US-priced biologics; China market dynamics)


  ## Future Directions


  Post-Phase 3, mazdutide development may expand to:


  - **Combination therapy:** + SGLT2i, metformin, or adjunctive agents

  - **Pediatric obesity:** Adolescent trials planned (age ≥12 years)

  - **NASH/MAFLD:** Hepatic steatosis endpoints in exploratory cohorts

  - **Hyperuricemia:** Patent claims suggest gout-related indication development

  - **Oral formulation:** Long-term R&D target (currently no disclosed oral program)


  ## References


  See `cite` arrays throughout document for PMID-linked evidence.
