synergy:
  stacks:
    - partner_slug: ghrp-6
      partner_label: GHRP-6
      synergy: multi-pathway
      rationale: >-
        GHRP-6 stimulates endogenous GH release, which drives hepatic IGF-1 synthesis. IGF-1 LR3
        provides exogenous, IGFBP-resistant IGF signaling. Combining upstream GH stimulation with
        downstream IGF receptor activation creates a dual-pathway anabolic effect. However, this
        bypasses natural feedback and carries compounded mitogenic risk.
      protocol:
        GHRP-6: 100–200 mcg SQ · 2–3× daily
        IGF-1 LR3: Research doses variable · post-workout typical in animal models
        Note: Research context only — no human protocols exist
      primary_benefit: Theoretical maximal anabolic signaling (GH + IGF axes)
      cite: []
    - partner_slug: ipamorelin
      partner_label: Ipamorelin
      synergy: multi-pathway
      rationale: >-
        Ipamorelin (selective GHRP) stimulates pulsatile GH release without cortisol/prolactin
        elevation. IGF-1 LR3 directly activates IGF-1R independent of GH. This stack targets both
        upstream (GH secretion) and downstream (IGF receptor) nodes but eliminates physiological
        feedback, raising safety concerns around unchecked proliferation.
      protocol:
        Ipamorelin: 200–300 mcg SQ · evening
        IGF-1 LR3: Research doses only · timing variable
        Caution: No human data; animal/in vitro only
      primary_benefit: Dual-axis anabolic signaling (theoretical)
      cite: []
description_md: >-
  ## Research Context


  IGF-1 LR3 is a laboratory-engineered variant of insulin-like growth factor 1, designed to overcome
  the bioavailability limitations of native IGF-1 by minimizing IGFBP sequestration. The
  13-amino-acid N-terminal extension and arginine-3 substitution reduce binding affinity for IGFBPs
  by approximately 3.3-fold, yielding prolonged circulation and enhanced tissue delivery.


  ## Key Structural Modifications


  - **N-terminal extension**: 13 additional amino acids at the N-terminus

  - **Position 3 substitution**: Arginine replaces glutamic acid

  - **Total length**: 83 amino acids (vs 70 for native IGF-1)

  - **IGFBP affinity**: Reduced 3.3-fold vs wild-type


  ## Primary Research Applications


  1. **Cell proliferation studies**: Myoblasts, fibroblasts, follicular cells

  2. **Anti-apoptotic mechanisms**: Cancer cell survival pathways

  3. **Angiogenesis inhibition**: IGFBP-3-independent effects

  4. **Atherosclerotic plaque stabilization**: Vascular smooth muscle phenotype

  5. **Telomerase activity**: Cancer immortalization research


  ## Critical Safety Considerations


  IGF-1 LR3 has demonstrated potent mitogenic activity in cancer cell lines, including 2–10-fold
  increases in telomerase activity in prostate cancer models. Its ability to bypass IGFBP regulation
  raises concerns about uncontrolled proliferative signaling. No human safety or efficacy trials
  have been published.


  ## Comparison to Native IGF-1


  | Parameter | Native IGF-1 | IGF-1 LR3 |

  |-----------|--------------|----------|

  | IGFBP binding | High | Low (3.3× reduced) |

  | Half-life | Minutes | Prolonged (exact duration unclear) |

  | Potency (in vitro) | Baseline | 2.5–3× higher |

  | Feedback regulation | GH-dependent | Bypassed |

  | FDA status | Approved forms exist | Not approved |


  ## Notable Findings


  - **Bovine follicle study**: LR3 stimulated follicle growth but caused oocyte degeneration at
  ≥1000 ng/mL

  - **Prostate cancer**: Stimulated telomerase activity via Akt pathway (wortmannin-sensitive)

  - **Atherosclerosis**: Reduced plaque core size and stenosis in ApoE-KO mice

  - **Myogenic cells**: Enhanced proliferation via both IGF-dependent and IGF-independent mechanisms
  when endogenously expressed


  ## Regulatory Status


  IGF-1 LR3 is not approved for human therapeutic use by the FDA or any major regulatory body. It
  remains a research reagent used in laboratory and veterinary contexts.
