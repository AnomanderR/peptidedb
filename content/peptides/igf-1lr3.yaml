summary:
  value: >-
    Synthetic IGF-1 analogue with arginine substitution at position 3 and a 13-amino-acid N-terminal
    extension. Exhibits markedly reduced binding to IGF-binding proteins (IGFBPs), producing
    prolonged half-life and enhanced bioavailability compared to native IGF-1. Primarily studied in
    research contexts for anabolic, anti-apoptotic, and cell proliferation effects.
  cite: []
