      rationale: >-
        ARA 290 targets the innate repair receptor (EPO/CD131) for nerve regeneration and
        anti-inflammatory signaling, while BPC-157 promotes angiogenesis and tissue repair through
        distinct mechanisms (likely involving VEGF, growth hormone receptor pathways). Combined,
        they may address both neuroinflammation and structural tissue repair in neuropathy or injury
        models. No direct clinical data; mechanistic overlap in tissue protection.
      protocol:
        ARA 290: 4 mg SQ · daily
        BPC-157: 250–500 mcg SQ · daily
        Frequency: Once daily, same or separate injections
      primary_benefit: Nerve regeneration, pain reduction, tissue healing
      cite: []
    - partner_slug: alpha-lipoic-acid
      partner_label: Alpha-Lipoic Acid
      synergy: multi-pathway
      rationale: >-
        Alpha-lipoic acid (ALA) is an antioxidant with demonstrated efficacy in diabetic neuropathy
        (reduces oxidative stress, improves nerve conduction). ARA 290 addresses neuroinflammation
        and nerve fiber regeneration via innate repair receptor signaling. Multi-pathway approach
        targeting oxidative damage (ALA) and repair signaling (ARA 290) may produce additive
        benefits in small fiber neuropathy. ALA mentioned in neuropathy treatment reviews alongside
        ARA 290.
      protocol:
        ARA 290: 4 mg SQ · daily
        ALA: 600 mg oral · daily or divided BID
        Frequency: ARA 290 once daily SQ; ALA oral with meals
      primary_benefit: Neuropathic pain reduction, nerve function improvement
      cite: []
description_md: >-
  ## Clinical Development


  ARA 290 (cibinetide) emerged from structure-function studies of erythropoietin's tissue-protective
  domain. The 11-amino-acid sequence from EPO helix B retains binding affinity for the innate repair
  receptor (EPO receptor / CD131 heterodimer) but lacks hematopoietic activity, eliminating
  thrombotic and polycythemia risks associated with full-length EPO.


  ### Phase 2 Trials


  **Sarcoidosis-Associated Small Fiber Neuropathy (Culver 2017):** 64 subjects randomized to ARA 290
  (4 mg daily × 28 days) or placebo. Primary endpoint: corneal nerve fiber area (CNFA) by corneal
  confocal microscopy. ARA 290 significantly increased CNFA and regenerating intraepidermal nerve
  fibers (GAP-43+), reduced neuropathic pain scores, and improved quality of life. No hematopoietic
  effects observed.


  **Type 2 Diabetes with Painful Neuropathy (Brines 2015):** ARA 290 (4 mg daily) improved HbA1c,
  fasting glucose, and neuropathic symptom scores. Corneal nerve fiber metrics improved, suggesting
  nerve regeneration. Metabolic control improvements suggest systemic tissue-protective effects
  beyond nerve repair.


  ### Mechanism Insights


  Preclinical studies (Liu 2014) demonstrate ARA 290 suppresses inflammatory macrophage activation,
  promotes Foxp3+ regulatory T cells, and reduces Th1-mediated inflammation in experimental
  autoimmune neuritis. The peptide does not stimulate erythropoiesis, confirmed across animal and
  human studies.


  ### Corneal Confocal Microscopy as Biomarker


  CCM quantifies corneal nerve fiber density, branch density, length, and area. Brines 2018
  demonstrates corneal nerve fiber size (width, area) adds diagnostic utility for small fiber
  neuropathy and detects therapeutic response earlier than skin biopsy. ARA 290 trials leveraged CCM
  as a surrogate endpoint for peripheral nerve regeneration.


  ## Neuropathy Context


  Small fiber neuropathy (SFN) affects C-fibers and Aδ-fibers, presenting with neuropathic pain,
  autonomic dysfunction, and impaired quality of life. Current treatments (gabapentinoids,
  duloxetine, tricyclics) address symptoms but do not reverse nerve damage. ARA 290 represents a
  disease-modifying approach targeting nerve regeneration and inflammation.


  Rendell 2021 reviews the difficulty of developing neuropathy treatments: slow disease progression
  necessitates long trials, and regulatory endpoints remain challenging. ARA 290's use of CCM and
  skin biopsy biomarkers offers a path to shorter, more sensitive trials.


  ## Delivery Technology


  Xie 2016 explored mesoporous silica nanoparticle delivery systems co-loaded with ARA 290 and
  Δ9-THC for pain relief in experimental neuropathy. The nanocarrier approach targets
  neuroinflammation sites, potentially reducing systemic exposure and side effects. This remains
  experimental.


  ## Current Status


  No FDA approval. Phase 2 trials completed; further development status unclear. The peptide's
  non-erythropoietic profile, favorable safety data, and objective nerve regeneration endpoints
  distinguish it from prior neuropathy candidates. No Phase 3 trials reported as of 2026.
