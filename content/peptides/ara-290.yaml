summary:
  value: >-
    Synthetic 11-amino-acid peptide derived from erythropoietin helix B. Non-erythropoietic but
    tissue-protective via innate repair receptor (EPO/CD131 heterodimer). Phase 2 trials demonstrate
    corneal nerve fiber regeneration, reduced neuropathic pain, and improved metabolic control in
    sarcoidosis-associated small fiber neuropathy and type 2 diabetes with painful neuropathy.
  cite:
