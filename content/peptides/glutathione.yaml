administration:
  steps:
    - title: Oral administration
      body: >-
        Capsule or liquid form, 250–1000 mg once daily. Take on empty stomach for improved
        absorption, though GI hydrolysis limits bioavailability. NAC precursor strategy often
        preferred.
      cite: []
    - title: Intravenous
      body: >-
        Clinical protocols: 600–1200 mg slow infusion over 30–60 minutes. Used for acute oxidative
        stress, hepatic detoxification support. Administered in medical settings.
      cite: []
    - title: Inhaled formulations
      body: >-
        Nebulized GSH (research protocols). Monitor for bronchospasm in reactive airway patients.
        Used experimentally for pulmonary oxidative stress.
      cite: []
    - title: Precursor supplementation
      body: >-
        N-acetylcysteine (NAC) 600–1200 mg/day PO. Provides cysteine substrate for endogenous GSH
        synthesis. Bypasses gastric degradation, preferred for chronic supplementation.
      cite: []
description_md: >-
  ## Background


  Glutathione (GSH) is a ubiquitous tripeptide (γ-L-glutamyl-L-cysteinyl-glycine) synthesized in
  virtually all mammalian cells. It serves as the principal non-enzymatic antioxidant and redox
  buffer, maintaining the cellular thiol-disulfide balance critical for protein folding,
  detoxification, and signaling.


  ## Biosynthesis


  GSH is synthesized via a two-step ATP-dependent pathway:


  1. **Glutamate-cysteine ligase (GCL)** — rate-limiting enzyme; couples glutamate and cysteine to
  form γ-glutamylcysteine.

  2. **Glutathione synthetase (GS)** — adds glycine to complete the tripeptide.


  Cysteine availability is the primary bottleneck. Extracellular GSH is catabolized by
  γ-glutamyltransferase (GGT) to supply cysteine to tissues, including tumors.


  ## Mechanism of Action


  GSH functions via multiple pathways:


  - **Direct ROS scavenging**: Reduces hydrogen peroxide, lipid peroxides, and reactive nitrogen
  species.

  - **GPX4 cofactor**: Glutathione peroxidase 4 uses GSH to reduce lipid hydroperoxides, preventing
  ferroptosis.

  - **Conjugation**: Glutathione S-transferases conjugate GSH to electrophiles (drugs, xenobiotics,
  carcinogens) for excretion.

  - **Protein redox regulation**: Glutathionylation of cysteine residues modulates enzyme activity
  and signaling.


  ## Clinical and Research Applications


  GSH supplementation has been explored in:


  - **Hepatic detoxification**: Acetaminophen overdose (N-acetylcysteine as precursor).

  - **Oxidative stress**: Neurodegenerative disease, metabolic syndrome.

  - **Aging**: GSH levels decline with age; supplementation investigated for mitochondrial function
  and lifespan.

  - **Cancer metabolism**: Paradoxical role — tumors rely on extracellular GSH catabolism for
  cysteine supply; depletion strategies vs. antioxidant supplementation debated.


  ## Formulation Challenges


  Oral GSH bioavailability is limited by gastric and intestinal hydrolysis. Strategies include:


  - **Liposomal GSH**: Encapsulation to bypass degradation.

  - **Sublingual**: Direct mucosal absorption.

  - **IV**: Medical settings for acute oxidative stress.

  - **Precursor loading**: NAC, glycine, and glutamine to support endogenous synthesis.


  ## Tissue-Specific Regulation


  GSH synthesis is upregulated by the Nrf2-ARE pathway in response to oxidative stress. Hepatocytes
  export GSH to plasma; extracellular GSH is taken up or catabolized by GGT. Tissue microstructures
  (e.g., ECM fibrous scaffolds) directly regulate hepatic GSH bioavailability via integrin β1
  mechanosignaling.


  ## Research Frontiers


  Recent work highlights:


  - **Cancer metabolism**: Extracellular GSH catabolism as a cysteine source for tumor growth.

  - **Ferroptosis inhibition**: GPX4-GSH axis as a critical defense against lipid
  peroxidation-driven cell death.

  - **Mechanobiology**: ECM microstructures regulate hepatocyte GSH synthesis independently of
  substrate availability.

  - **Agricultural biotechnology**: GCL overexpression in crops (potato, patchouli) reduces
  oxidative stress and acrylamide formation.


  ## Safety Profile


  GSH is well-tolerated. Concerns include:


  - **Tumor cysteine supply**: Theoretical risk in active malignancy.

  - **Bronchospasm**: Rare with inhaled formulations in asthmatics.

  - **GI discomfort**: Mild, dose-dependent with oral supplementation.


  Precursor strategies (NAC) are generally preferred for chronic use due to superior bioavailability
  and safety profile.
