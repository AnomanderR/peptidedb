administration:
  steps:
    - title: Preparation (IV infusion)
      body: >-
        Dilute prescribed dose (10-50 mL) in 100-250 mL 0.9% sodium chloride. Use immediately after
        preparation. Do not mix with other medications in same infusion bag.
      cite: []
    - title: Infusion rate
      body: >-
        Administer over 30-60 minutes. Slower infusion reduces risk of transient hypotension or
        flushing. Monitor vital signs during first administration.
      cite: []
    - title: IM injection (alternative)
      body: >-
        For 5-10 mL doses: inject deep IM into gluteal or deltoid muscle. Rotate sites if repeated
        daily. IM preferred for outpatient/chronic use.
      cite: []
    - title: Timing
      body: >-
        Acute stroke: initiate within 6-12 hrs of symptom onset. Daily administration, preferably
        same time each day. Continue 10-21 days per protocol.
      cite: []
    - title: Storage
      body: >-
        Store unopened ampoules at 15-25°C, protected from light. Do not freeze. Use diluted
        solution immediately; discard unused portion.
      cite: []
    - title: Co-administration
      body: >-
        Compatible with standard stroke care (thrombolysis, thrombectomy, antiplatelet/anticoagulant
        therapy). Does not interfere with reperfusion therapies.
      cite: []
synergy:
  stacks:
    - partner_slug: semax
      partner_label: Semax
      synergy: moderate
      rationale: >-
        Cerebrolysin (multimodal neurotrophic peptide mix) and Semax (ACTH(4-10) analogue) operate
        through complementary neuroprotective pathways. Cerebrolysin elevates BDNF and suppresses
        apoptosis/inflammation via TrkB/TrkA signaling, while Semax enhances neuroplasticity through
        BDNF upregulation and dopaminergic modulation. Combined use in stroke or TBI may amplify
        anti-apoptotic effects and accelerate cognitive/motor recovery, though no direct RCT data
        exist for the combination.
      protocol:
        Cerebrolysin: 30 mL IV daily × 10-14 days
        Semax: 300-600 mcg intranasal BID × 10-14 days
        Timing: Concurrent during acute recovery phase
      primary_benefit: Enhanced neuroprotection, accelerated motor/cognitive recovery post-stroke or TBI
      cite: []
    - partner_slug: bpc-157
      partner_label: BPC-157
      synergy: multi-pathway
      rationale: >-
        Cerebrolysin provides CNS-specific neurotrophic support (BDNF, NGF pathways), while BPC-157
        offers systemic tissue repair via angiogenesis (VEGF upregulation) and anti-inflammatory
        effects. In traumatic brain injury or stroke, Cerebrolysin addresses neuronal survival and
        synaptic plasticity, whereas BPC-157 may enhance vascular repair and blood-brain barrier
        integrity. The combination targets both neuronal and vascular compartments of brain injury,
        though clinical validation is lacking.
      protocol:
        Cerebrolysin: 30-50 mL IV daily × 14 days
        BPC-157: 250-500 mcg SQ daily × 14-28 days
        Timing: Initiate both within 24-48 hrs of injury
      primary_benefit: Dual neuronal + vascular repair in TBI or stroke; accelerated functional recovery
      cite: []
description_md: >-
  ## Clinical Context


  Cerebrolysin has been investigated in over 2,800 patients across 14 randomized controlled trials,
  with meta-analytic evidence supporting neurological improvement (NIHSS reduction, functional
  independence) in acute ischemic stroke. Propensity-matched 12-month data from a 238-patient cohort
  show that adjunctive Cerebrolysin with mechanical thrombectomy increases mRS 0-2 (functional
  independence) from 35% to 49%, representing a 40% relative improvement in favorable outcomes.


  ## Mechanism Insights


  The preparation contains bioactive peptides derived from enzymatic breakdown of porcine brain
  proteins, yielding low-molecular-weight (<10 kDa) fragments that mimic endogenous neurotrophic
  factors. Key mechanistic actions include:


  - **BDNF elevation**: Rat MCA occlusion models show significant BDNF upregulation at 24 hours
  post-reperfusion (Western blot).

  - **Anti-apoptotic effects**: Bcl-2 upregulation, Bax downregulation, reduced caspase-3
  activation.

  - **Anti-inflammatory action**: TNF-α suppression observed in multiple preclinical models.

  - **Hemorrhagic transformation reduction**: 52% lower HT incidence in high-risk post-thrombolysis
  patients, with accelerated hazard stabilization permitting earlier anticoagulation resumption.


  ## Regulatory Status


  Approved in >30 countries (predominantly Eastern Europe, Asia, Latin America) for stroke,
  dementia, and TBI. Not FDA-approved in the United States. Phase 3 data exist, but heterogeneity in
  trial design and outcome reporting has limited global regulatory acceptance.


  ## Dosing Nuances


  - **Acute stroke**: 30-50 mL IV daily × 10-14 days, initiated within 6-12 hours.

  - **Chronic dementia/TBI**: 10-20 mL IV or IM daily, intermittent courses (e.g., 10 days/month).

  - **Intracerebral hemorrhage**: 50 mL IV daily × 14 days per CLINCH pilot trial.


  ## Safety Profile


  Meta-analysis of 14 RCTs shows no significant increase in serious adverse events (RR 1.02, 95% CI
  0.87-1.20) or mortality (RR 0.89, 0.68-1.18) vs placebo. Hemorrhagic transformation risk is
  reduced, not elevated. Porcine origin raises theoretical immunogenicity concerns, but clinically
  significant allergic reactions are rare.
