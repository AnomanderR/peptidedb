summary:
  value: >-
    Porcine brain-derived peptide preparation containing low-molecular-weight neurotrophic peptides
    and free amino acids. Approved in 30+ countries for acute ischemic stroke, traumatic brain
    injury, and dementia. Phase 3 data in mechanical thrombectomy show improved 12-month functional
    independence (mRS 0-2) from 35% to 49%. Mimics endogenous neurotrophic factors (BDNF, NGF, CNTF)
    with multimodal neuroprotection: anti-apoptotic, anti-inflammatory, pro-neuroplastic effects.
  cite: []
