description_md: >-
  ## Overview


  Dihexa is a small-molecule angiotensin IV analogue developed to activate the hepatocyte growth
  factor (HGF)/c-Met receptor system in the brain. In rodent models, it demonstrates procognitive
  effects and induces synaptogenesis—dendritic arborization and new synapse formation—in mouse
  Alzheimer's disease models.


  ## Evidence Base


  All available evidence is from **animal studies only**. There are no published Phase 1, 2, or 3
  human clinical trials. The peptide was designed based on the hypothesis that the HGF/c-Met system
  represents a therapeutic target for neurodegenerative diseases, particularly Alzheimer's disease.


  Animal studies show:

  - Cognitive enhancement in rodent models

  - Synapse formation in mouse Alzheimer's models

  - Dependence on c-Met receptor activation (effects blocked by c-Met antagonists)


  ## Safety & Clinical Development


  No human safety data exist. The c-Met receptor pathway has been implicated in tumorigenesis,
  raising theoretical cancer risk concerns that would require extensive pre-clinical toxicology and
  Phase 1 safety studies before human trials.


  Dihexa is **not FDA-approved** and remains a research compound without established dosing,
  administration protocols, or safety profile in humans.


  ## Retraction Notice


  One key study (Benoist et al., 2014, JPET) was **retracted in 2025** following an expression of
  concern in 2021. This retraction affects the synaptogenic and procognitive evidence base, which
  relies heavily on this publication.
