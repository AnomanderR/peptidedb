summary:
  value: >-
    Placental glycoprotein hormone structurally homologous to luteinizing hormone (LH). Binds LH
    receptors on Leydig cells, stimulating testosterone synthesis and spermatogenesis. FDA-approved
    for cryptorchidism, prepubertal cryptorchidism, and hypogonadotropic hypogonadism. In males with
    hypogonadotropic hypogonadism, hCG monotherapy or combined with FSH restores spermatogenesis in
    70–90% of azoospermic patients, achieving pregnancies in 60–80% of cases.
  cite: []
