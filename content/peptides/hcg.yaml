administration:
  steps:
    - title: Reconstitution (if lyophilized)
      body: >-
        Add sterile water or bacteriostatic water per manufacturer instructions. Typically 1–2 mL
        per 5,000–10,000 IU vial. Roll gently — do not shake. Solution should be clear.
      cite: []
    - title: Injection site
      body: >-
        Intramuscular: ventrogluteal, vastus lateralis, or deltoid. Subcutaneous: abdomen, avoiding
        navel (2-inch radius). Rotate sites to prevent lipohypertrophy.
      cite: []
    - title: Timing
      body: >-
        Administer 2–3 times per week. Consistent weekly schedule recommended (e.g., Monday/Thursday
        or Monday/Wednesday/Friday).
      cite: []
    - title: Storage
      body: >-
        Lyophilized: room temperature, light-protected. Reconstituted: refrigerate 2–8 °C.
        Bacteriostatic water extends shelf life to ~30 days; sterile water use within 72 hours.
      cite: []
    - title: Needle selection
      body: 'IM: 21–23G, 1–1.5 inch. SQ: 25–27G, 5/8 inch. Inject slowly (30–60 seconds for IM).'
      cite: []
synergy:
  stacks:
    - partner_slug: fsh
      partner_label: FSH (Follicle-Stimulating Hormone)
      synergy: strong
      rationale: >-
        hCG restores intratesticular testosterone via LH receptor stimulation, while FSH acts on
        Sertoli cells to directly support spermatogenesis. Combined therapy achieves 70–90% sperm
        induction vs 50–70% with hCG monotherapy in hypogonadotropic hypogonadism. FSH addition
        accelerates seminiferous tubule maturation and increases sperm concentration/motility,
        particularly in congenital HH with prior azoospermia.
      protocol:
        hCG: 2,000 IU IM/SQ 2×/week
        rFSH: 75 IU SQ 3×/week
        Duration: 12–24 months minimum
      primary_benefit: >-
        Maximal spermatogenesis restoration, shortened time to sperm appearance, higher pregnancy
        rates
      cite: []
    - partner_slug: testosterone
      partner_label: Testosterone (exogenous)
      synergy: moderate
      rationale: >-
        Experimental triple therapy (hCG + FSH + testosterone) in congenital HH accelerates
        virilization and psychosocial outcomes while reducing cumulative hCG requirements by ~30%.
        Exogenous testosterone provides immediate symptom relief during the 12–18 month window
        before endogenous production normalizes. However, supraphysiological testosterone may
        suppress endogenous HPG axis and complicate long-term fertility goals. Reserved for cases
        prioritizing rapid virilization.
      protocol:
        hCG: 2,000 IU IM 2×/week
        Testosterone: 100 mg IM every 2 weeks
        rFSH: 75 IU SQ 3×/week (if fertility desired)
      primary_benefit: Rapid virilization, reduced hCG dose, improved psychosocial outcomes in delayed puberty
      cite: []
description_md: >-
  ## Clinical Context


  hCG is the primary therapeutic agent for restoring fertility in males with hypogonadotropic
  hypogonadism (HH), a condition characterized by deficient GnRH secretion leading to secondary
  testicular failure. Unlike testosterone replacement therapy — which suppresses endogenous LH and
  arrests spermatogenesis — hCG directly stimulates Leydig cells, preserving or restoring the
  intratesticular testosterone concentrations (70–100× serum levels) required for sperm production.


  ## Fertility Outcomes


  Systematic reviews demonstrate 70–90% sperm induction rates in azoospermic HH patients treated
  with hCG ± FSH, with 60–80% achieving partner pregnancy. Median time to sperm appearance ranges
  12–24 months; congenital HH (e.g., Kallmann syndrome, KISS1R mutations) requires longer treatment
  than acquired HH. Predictors of success include baseline testicular volume >4 mL, prior
  cryptorchidism absence, and younger age at treatment initiation.


  ## Formulations


  - **Urinary-derived hCG**: Extracted from pregnancy urine; contains trace LH activity. Lower cost,
  higher immunogenicity risk.

  - **Recombinant hCG**: Produced via CHO cell lines; homogeneous glycosylation, reduced batch
  variability. Preferred in fertility protocols.


  ## Genetic Basis of HH


  Recent studies identify novel mutations (KISS1, KISS1R/GPR54, KAL1) underlying normosmic or
  anosmic HH. Genetic diagnosis informs prognosis: KISS1R mutations often respond well to
  gonadotropin therapy, while complex syndromic forms may require adjunctive interventions.
