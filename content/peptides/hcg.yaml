      value:
        value: 2,000 IU IM/SQ 2–3×/week
        cite:
          - konsam-2026
          - zachariou-2026
      notes:
        value: Titrate to normalize testosterone (300–1,000 ng/dL) or achieve target AMH ~7.4 ng/mL.
        cite: []
