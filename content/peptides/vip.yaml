summary:
  value: >-
    28-amino-acid endogenous neuropeptide and VPAC1/VPAC2 GPCR agonist. Mediates vasodilation,
    smooth muscle relaxation, and potent anti-inflammatory effects in pulmonary tissue. Aviptadil
    (synthetic VIP analogue) received Emergency Use Authorization for COVID-19 ARDS and is under
    investigation for congenital diaphragmatic hernia, transfusion-related acute lung injury, and
    post-COVID pulmonary fibrosis.
  cite: []
