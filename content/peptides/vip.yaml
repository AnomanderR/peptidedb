description_md: >-
  ## Clinical Development Context


  VIP gained prominence during the COVID-19 pandemic when aviptadil (synthetic VIP) received
  Emergency Use Authorization for acute respiratory distress syndrome. The TESICO Phase 3 trial
  enrolled 816 patients with COVID-19-associated hypoxemic respiratory failure, evaluating
  intravenous aviptadil combined with remdesivir versus placebo.


  ## Pulmonary-Specific Actions


  VIP demonstrates preferential concentration in pulmonary alveolar type II cells, which express
  high densities of VPAC1 receptors. This anatomical specificity underlies its therapeutic potential
  in ARDS, where alveolar epithelial injury is the primary pathology. The peptide inhibits
  pro-inflammatory cytokines (TNF-α, IL-6), reduces neutrophil recruitment, and stabilizes the
  alveolar-capillary barrier.


  ## Beyond COVID-19


  Investigational applications extend to congenital diaphragmatic hernia (CDH-associated pulmonary
  hypoplasia), transfusion-related acute lung injury (TRALI), and post-COVID interstitial lung
  disease. Animal models demonstrate reduced pulmonary vascular remodeling and preserved lung
  architecture with VIP analogue therapy.


  ## Synthesis Challenges


  Chemo-enzymatic synthesis using peptiligase has emerged as an efficient production method for
  aviptadil, addressing the complexity of manufacturing a 28-residue peptide at clinical scale.
