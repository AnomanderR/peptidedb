administration:
  steps:
    - title: Preparation (IV)
      body: >-
        Reconstitute lyophilized aviptadil powder with sterile diluent per manufacturer protocol.
        Inspect solution for particulates — should be clear and colorless.
      cite: []
    - title: IV infusion
      body: >-
        Administer as continuous 12-hour intravenous infusion via central or peripheral line. Use
        infusion pump for precise dosing (60–90 mcg/kg/day divided over infusion duration).
      cite: []
    - title: Monitoring
      body: >-
        Monitor blood pressure, heart rate, and oxygenation continuously during first infusion.
        Assess for hypotension and adjust infusion rate if needed.
      cite: []
    - title: Inhaled protocol (investigational)
