description_md: >-
  ## Context


  Kisspeptin-10 represents the minimal active fragment of the KISS1 gene product, a master regulator
  of mammalian reproduction. Discovery of kisspeptin revolutionized reproductive neuroendocrinology
  by identifying the critical link between metabolic status and fertility. KNDy neurons
  (co-expressing kisspeptin, neurokinin B, and dynorphin) in the arcuate nucleus function as the
  GnRH pulse generator, integrating signals from leptin, insulin, IGF-1, and sex steroids to gate
  reproductive competence.


  ## Reproductive Physiology


  Kisspeptin neurons project directly to GnRH neurons and drive their pulsatile firing.
  Loss-of-function mutations in GPR54 cause hypogonadotropic hypogonadism in humans. Kisspeptin also
  mediates the estradiol-positive feedback mechanism triggering the preovulatory LH surge. Beyond
  fertility, kisspeptin pathways are implicated in metabolic regulation, with reciprocal
  interactions between reproductive and energy homeostasis circuits.


  ## Clinical Development


  Phase 1/2 trials have explored kisspeptin-10 in hypothalamic amenorrhea, IVF optimization
  (ovulation triggering), and as a diagnostic tool for GnRH neuron competence. Advantages over
  traditional GnRH agonists include preserved physiological pulsatility and potential for targeted
  neuroendocrine rescue without pituitary desensitization. Challenges include short half-life and
  need for pulsatile delivery systems.


  ## Metabolic Integration


  Kisspeptin neurons are nutrient sensors, linking energy availability to reproductive axis
  activation. Undernutrition suppresses kisspeptin expression, contributing to hypothalamic
  amenorrhea in anorexia nervosa and female athlete triad. Conversely, obesity-related
  hyperleptinemia can disrupt kisspeptin signaling. This positions kisspeptin pathways as
  therapeutic targets for both metabolic and reproductive dysfunction.
