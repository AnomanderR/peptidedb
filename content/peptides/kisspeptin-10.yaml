administration:
  steps:
    - title: Reconstitution (if lyophilized)
      body: >-
        Reconstitute with sterile water or saline per protocol. Gently swirl — do not shake.
        Solution should be clear and colorless.
      cite: []
    - title: Route selection
      body: >-
        IV infusion for pulsatile delivery in clinical trials; SQ for outpatient protocols. IV
        allows precise temporal control of GnRH pulse frequency.
      cite: []
    - title: Timing
      body: >-
        Pulsatile dosing (e.g., every 60–90 min) mimics physiological GnRH pulse generator.
        Single-bolus protocols used for LH surge induction in fertility research.
      cite: []
    - title: Monitoring
      body: >-
        Serial LH, FSH, estradiol measurements to confirm HPG axis activation. Ultrasound monitoring
        for ovarian response in fertility applications.
      cite: []
    - title: Storage
      body: >-
        Lyophilized: store at 2–8 °C, light-protected. Reconstituted: refrigerate, use within 24–48
        hours per protocol.
      cite: []
