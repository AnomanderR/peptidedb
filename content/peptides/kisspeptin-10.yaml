    10-amino-acid C-terminal fragment of kisspeptin (KISS1 gene product). Activates GPR54/Kiss1R on
    hypothalamic GnRH neurons, triggering LH surge. Phase 1/2 trials in fertility research and
    hypothalamic amenorrhea. Core regulator of the hypothalamic-pituitary-gonadal axis, integrating
    metabolic and reproductive signals through direct GnRH neuron excitation.
